name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build viewer
        run: pnpm --filter @vibe-replay/viewer build

      - name: Build CLI
        run: |
          mkdir -p packages/cli/assets
          cp packages/viewer/dist/index.html packages/cli/assets/viewer.html
          pnpm --filter vibe-replay build

      - name: Build website
        run: |
          mkdir -p website/public/view
          cp packages/viewer/dist/index.html website/public/view/index.html
          pnpm --filter @vibe-replay/website build
