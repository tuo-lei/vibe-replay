name: Claude CI Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  fix-ci:
    # Only run on PR failures, not pushes to main
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            // Get associated PRs
            const prs = run.pull_requests;
            if (prs && prs.length > 0) {
              return prs[0].number;
            }
            // Fallback: search by head branch
            const { data } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${run.head_branch}`,
              state: 'open'
            });
            return data.length > 0 ? data[0].number : '';
          result-encoding: string

      - name: Checkout repository
        if: steps.pr.outputs.result != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 1

      - name: Run Claude to fix CI
        if: steps.pr.outputs.result != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_oauth: true
          direct_prompt: |
            The CI workflow failed on PR #${{ steps.pr.outputs.result }}.

            1. Read the failed CI logs using: gh run view ${{ github.event.workflow_run.id }} --log-failed
            2. Analyze the failure and fix the issue
            3. Run the failing check locally to verify your fix
            4. Commit and push the fix

            Be concise. Fix only what's broken, don't refactor unrelated code.
          additional_permissions: |
            actions: read
