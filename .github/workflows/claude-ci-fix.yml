name: Claude CI Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: claude-ci-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  fix-ci:
    # Only run on PR failures, not pushes to main
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            // Get associated PRs
            const prs = run.pull_requests;
            if (prs && prs.length > 0) {
              return prs[0].number;
            }
            // Fallback: search by head branch
            const { data } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${run.head_branch}`,
              state: 'open'
            });
            return data.length > 0 ? data[0].number : '';
          result-encoding: string

      - name: Check if last commit was from Claude (prevent loops)
        id: loop_check
        if: steps.pr.outputs.result != ''
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const { data: commit } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: process.env.HEAD_SHA,
            });
            const author = commit.author.name || '';
            const isClaude = author.toLowerCase().includes('claude');
            core.setOutput('is_claude', isClaude.toString());
            if (isClaude) {
              core.info('Last commit was from Claude — skipping to prevent loop');
            }

      - name: Identify failure type
        id: failure
        if: steps.pr.outputs.result != '' && steps.loop_check.outputs.is_claude != 'true'
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
        with:
          script: |
            const { data } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: parseInt(process.env.RUN_ID),
            });
            const failed = data.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => j.name);
            const hasTest = failed.includes('test');
            const hasLintOrBuild = failed.some(n => n === 'lint' || n === 'build');
            core.setOutput('has_test', hasTest.toString());
            core.setOutput('has_lint_or_build', hasLintOrBuild.toString());
            core.setOutput('failed_jobs', failed.join(', '));

      - name: Checkout repository
        if: steps.pr.outputs.result != '' && steps.loop_check.outputs.is_claude != 'true' && steps.failure.outputs.has_lint_or_build == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 1

      # Auto-fix lint and build failures — these are unambiguous
      - name: Auto-fix lint/build failures
        if: steps.pr.outputs.result != '' && steps.loop_check.outputs.is_claude != 'true' && steps.failure.outputs.has_lint_or_build == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_oauth: true
          direct_prompt: |
            The CI workflow failed on PR #${{ steps.pr.outputs.result }}.
            Failed jobs: ${{ steps.failure.outputs.failed_jobs }}

            1. Read the failed CI logs: gh run view ${{ github.event.workflow_run.id }} --log-failed
            2. Fix ONLY lint and build errors (formatting, missing imports, type errors, etc.)
            3. Do NOT modify any test files or test expectations
            4. Run the failing check locally to verify
            5. Commit and push the fix

            Be concise. Fix only what's broken.
          additional_permissions: |
            actions: read

      # Test failures get a comment only — human decides whether to fix test or code
      - name: Comment on test failures
        if: steps.pr.outputs.result != '' && steps.loop_check.outputs.is_claude != 'true' && steps.failure.outputs.has_test == 'true'
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        with:
          script: |
            // Get failed log excerpt via CLI
            const { execSync } = require('child_process');
            let logs = '';
            try {
              logs = execSync(
                `gh run view ${process.env.RUN_ID} --log-failed 2>&1 | tail -50`,
                { encoding: 'utf-8', timeout: 30000 }
              );
            } catch (e) {
              logs = '(Could not retrieve logs)';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.pr.outputs.result }}'),
              body: [
                '## 🔴 Test failure detected',
                '',
                `[CI run](${process.env.RUN_URL})`,
                '',
                '<details><summary>Failed test logs</summary>',
                '',
                '```',
                logs.slice(-3000),
                '```',
                '</details>',
                '',
                'Test failures need human judgement — is the test wrong or is the code wrong?',
                '',
                'To have Claude attempt a fix, reply with:',
                '`@claude Fix the test failure. The intended behavior is: <describe what should happen>`',
              ].join('\n'),
            });
